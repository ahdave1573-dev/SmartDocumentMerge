<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SmartMerge — Professional PDF Tools{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="{{ url_for('index') }}" class="nav-brand">
                <span class="brand-icon">⚡</span>
                <span class="brand-text">SmartMerge</span>
            </a>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}" class="nav-link">Home</a></li>
                <li class="dropdown">
                    <a href="#" class="nav-link">Tools ▾</a>
                    <div class="dropdown-content">
                        {% for t in tools %}
                        <a href="{{ url_for('tool_page', tool_id=t.id) }}">{{ t.icon }} {{ t.title }}</a>
                        {% endfor %}
                    </div>
                </li>
                <li><a href="{{ url_for('history') }}" class="nav-link">History</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-brand">
                <span class="brand-icon">⚡</span>
                <span class="brand-text">SmartMerge</span>
            </div>
            <p>&copy; 2026 Smart Document Merge System. Developed by <b>Anshul Dave</b></p>
        </div>
    </footer>

    <div id="toastContainer" class="toast-container"></div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
